// Root build file — shared configuration applied to every subproject.
subprojects {
    apply plugin: 'java'

    group   = 'dev.audioserver'
    version = '1.0.0-SNAPSHOT'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    compileJava.options.compilerArgs += ['--enable-preview']
    compileJava.options.release = 25

    repositories {
        mavenCentral()
        maven { url 'https://repo.papermc.io/repository/maven-public/' }
        maven { url 'https://repo.incendo.org/content/repositories/snapshots' }
        maven { url 'https://maven.enginehub.org/repo/' }
    }
}
